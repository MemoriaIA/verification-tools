name: Verification Tools CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gates:
    name: gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SQLite on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Install SQLite on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install sqlite -y --no-progress
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          sqlite3 --version

      - name: Tool versions
        run: |
          python --version
          bash --version
          sqlite3 --version
          git --version

      - name: Syntax check shell verifiers
        run: |
          bash -n tests/run-gates.sh
          bash -n verify/verify-hashchain.sh

      - name: Compile Python verifier
        run: |
          python -m py_compile memoriaia/verify/verify-hashchain.py

      - name: Whitespace guard
        run: |
          git diff --check

      - name: Run verification gate suite
        id: run_gates
        run: |
          bash tests/run-gates.sh

      - name: G-19 CI anti-theater (run-gates execution proof required)
        if: always()
        env:
          VT_G19_EXPECTED_RUN_GATES_SHA: "102abbfb0e4bd8e95921d8ac5e338251c9a1999431a0a7db5e49177b2ac3a938"
          VT_G19_EXPECTED_STRUCTURAL_CHECK_SHA: "e2a48bbc5b63a76dca82c4dff22128c685da00184938c30f24540b3025bee4b7"
          VT_G19_EXPECTED_FIXTURE_MANIFEST_SHA: "319860e90b203eb5cc492dd219065b4e76fb94d11af08d5efc7e8f05d6caea0a"
        run: |
          if [ "${{ steps.run_gates.outcome }}" != "success" ]; then
            echo "G-19 FAIL: tests/run-gates.sh did not complete successfully (outcome: ${{ steps.run_gates.outcome }})"
            exit 1
          fi
          RUN_GATES_SHA="$(sha256sum tests/run-gates.sh | awk '{print $1}')"
          if [ "$RUN_GATES_SHA" != "$VT_G19_EXPECTED_RUN_GATES_SHA" ]; then
            echo "G-19 FAIL: tests/run-gates.sh hash mismatch ($RUN_GATES_SHA)"
            exit 1
          fi
          STRUCTURAL_CHECK_SHA="$(sha256sum tests/g19-v2-structural-check.sh | awk '{print $1}')"
          if [ "$STRUCTURAL_CHECK_SHA" != "$VT_G19_EXPECTED_STRUCTURAL_CHECK_SHA" ]; then
            echo "G-19 FAIL: tests/g19-v2-structural-check.sh hash mismatch ($STRUCTURAL_CHECK_SHA)"
            exit 1
          fi
          FIXTURE_MANIFEST_SHA="$(git ls-files -z 'tests/fixtures/g19-v2/*.yml' | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
          if [ "$FIXTURE_MANIFEST_SHA" != "$VT_G19_EXPECTED_FIXTURE_MANIFEST_SHA" ]; then
            echo "G-19 FAIL: G-19 fixture manifest hash mismatch ($FIXTURE_MANIFEST_SHA)"
            exit 1
          fi
          PROOF="${{ steps.run_gates.outputs.vt_g19_exec_proof }}"
          if [ -z "$PROOF" ]; then
            echo "G-19 FAIL: VT_G19_EXEC_PROOF is missing"
            exit 1
          fi
          if ! printf '%s\n' "$PROOF" | grep -qE '^[0-9a-f]{64}$'; then
            echo "G-19 FAIL: VT_G19_EXEC_PROOF is invalid ($PROOF)"
            exit 1
          fi
          EXPECTED_PROOF="$(printf 'VT_G19_EXECUTED:%s\nRUN_GATES:%s\nSTRUCTURAL:%s\nFIXTURES:%s\n' "$(git rev-parse HEAD)" "$RUN_GATES_SHA" "$STRUCTURAL_CHECK_SHA" "$FIXTURE_MANIFEST_SHA" | sha256sum | awk '{print $1}')"
          if [ "$PROOF" != "$EXPECTED_PROOF" ]; then
            echo "G-19 FAIL: VT_G19_EXEC_PROOF preimage mismatch (expected $EXPECTED_PROOF, got $PROOF)"
            exit 1
          fi
          echo "G-19 PASS: Execution proved ($PROOF)"
