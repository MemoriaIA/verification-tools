name: Verification Tools CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    name: gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SQLite on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Install SQLite on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install sqlite -y --no-progress
          "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          sqlite3 --version

      - name: Tool versions
        run: |
          python --version
          bash --version
          sqlite3 --version
          git --version

      - name: Syntax check shell verifiers
        run: |
          bash -n tests/run-gates.sh
          bash -n verify/verify-hashchain.sh

      - name: Compile Python verifier
        run: |
          python -m py_compile memoriaia/verify/verify-hashchain.py

      - name: Whitespace guard
        env:
          VT_WS_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          VT_WS_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VT_WS_EVENT_NAME: ${{ github.event_name }}
        run: |
          if ! printf '%s\n' "$VT_WS_BASE_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "WHITESPACE FAIL: base SHA is invalid ($VT_WS_BASE_SHA)"
            exit 1
          fi
          if ! printf '%s\n' "$VT_WS_HEAD_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "WHITESPACE FAIL: head SHA is invalid ($VT_WS_HEAD_SHA)"
            exit 1
          fi
          if ! git cat-file -e "$VT_WS_BASE_SHA^{commit}" 2>/dev/null; then
            echo "WHITESPACE FAIL: base commit is unavailable ($VT_WS_BASE_SHA)"
            exit 1
          fi
          if ! git cat-file -e "$VT_WS_HEAD_SHA^{commit}" 2>/dev/null; then
            echo "WHITESPACE FAIL: head commit is unavailable ($VT_WS_HEAD_SHA)"
            exit 1
          fi
          if [ "$VT_WS_EVENT_NAME" = "pull_request" ] || [ "$VT_WS_EVENT_NAME" = "pull_request_target" ]; then
            WHITESPACE_RANGE="$VT_WS_BASE_SHA...$VT_WS_HEAD_SHA"
          else
            WHITESPACE_RANGE="$VT_WS_BASE_SHA..$VT_WS_HEAD_SHA"
          fi
          echo "WHITESPACE RANGE: $WHITESPACE_RANGE"
          WHITESPACE_CHANGED_FILE=.vt-whitespace-changed-paths.txt
          git diff --name-status --no-renames "$WHITESPACE_RANGE" > "$WHITESPACE_CHANGED_FILE"
          WS_ATTR_CHANGED=0
          while IFS= read -r ws_line; do
            [ -z "$ws_line" ] && continue
            ws_path="${ws_line#*$'\t'}"
            case "$ws_path" in
              .gitattributes|*/.gitattributes)
                WS_ATTR_CHANGED=1
                ;;
            esac
          done < "$WHITESPACE_CHANGED_FILE"
          if [ "$WS_ATTR_CHANGED" -eq 1 ]; then
            echo "WHITESPACE FAIL: .gitattributes changed in checked range ($WHITESPACE_RANGE)"
            exit 1
          fi
          rm -f "$WHITESPACE_CHANGED_FILE"
          git -c core.attributesFile=/dev/null diff --check "$WHITESPACE_RANGE"

      - name: Run verification gate suite
        id: run_gates
        env:
          VT_G19_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VT_G19_PR_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || github.sha }}
          VT_G19_CHECKOUT_SHA: ${{ github.sha }}
          VT_G19_EXPECTED_WORKSPACE_HELPER_SHA: "e105de0bca00c509bfff6923515cccb9ab416013a20f17ff90a7159c52890a06"
        run: |
          if [ -n "${GIT_DIR:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_DIR)"
            exit 1
          fi
          if [ -n "${GIT_WORK_TREE:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_WORK_TREE)"
            exit 1
          fi
          if [ -n "${GIT_EXEC_PATH:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_EXEC_PATH)"
            exit 1
          fi
          if [ -n "${GIT_INDEX_FILE:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_INDEX_FILE)"
            exit 1
          fi
          if [ -n "${GIT_OBJECT_DIRECTORY:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_OBJECT_DIRECTORY)"
            exit 1
          fi
          if [ -n "${GIT_ALTERNATE_OBJECT_DIRECTORIES:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_ALTERNATE_OBJECT_DIRECTORIES)"
            exit 1
          fi
          if [ -n "${GIT_CONFIG:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CONFIG)"
            exit 1
          fi
          if [ -n "${GIT_CONFIG_GLOBAL:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CONFIG_GLOBAL)"
            exit 1
          fi
          if [ -n "${GIT_CONFIG_SYSTEM:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CONFIG_SYSTEM)"
            exit 1
          fi
          if [ -n "${GIT_CONFIG_NOSYSTEM:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CONFIG_NOSYSTEM)"
            exit 1
          fi
          if [ -n "${GIT_NAMESPACE:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_NAMESPACE)"
            exit 1
          fi
          if [ -n "${GIT_CEILING_DIRECTORIES:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CEILING_DIRECTORIES)"
            exit 1
          fi
          if [ -n "${GIT_PAGER:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_PAGER)"
            exit 1
          fi
          git_config_env="$(env | sed -n 's/^\(GIT_CONFIG_[^=]*\)=.*/\1/p' | head -n 1)"
          if [ -n "$git_config_env" ]; then
            echo "G-19 FAIL: proof-critical git config environment variable is set ($git_config_env)"
            exit 1
          fi
          if ! GIT_BIN="$(command -v git)"; then
            echo "G-19 FAIL: git executable is unavailable"
            exit 1
          fi
          if [ ! -x "$GIT_BIN" ]; then
            echo "G-19 FAIL: git executable is unavailable"
            exit 1
          fi
          GIT_BIN_DIR="$(cd "$(dirname "$GIT_BIN")" && pwd -P)"
          GIT_BIN="$GIT_BIN_DIR/$(basename "$GIT_BIN")"
          WORKSPACE_PHYSICAL="$(pwd -P)"
          if [[ "$GIT_BIN" == "$WORKSPACE_PHYSICAL"/* || "$GIT_BIN" == /tmp/* || "$GIT_BIN" == /var/tmp/* || "$GIT_BIN" == /dev/shm/* || "$GIT_BIN" == */AppData/Local/Temp/* || "$GIT_BIN" == */Temp/* || "$GIT_BIN" == */_temp/* ]]; then
            echo "G-19 FAIL: git executable resolves outside trusted system paths ($GIT_BIN)"
            exit 1
          fi
          ROOT_WORKSPACE="$PWD"
          MATERIALIZED_WORKTREE="$(mktemp -d)"
          cleanup_materialized_worktree() {
            cd "$ROOT_WORKSPACE"
            "$GIT_BIN" worktree remove --force "$MATERIALIZED_WORKTREE" >/dev/null 2>&1 || rm -rf "$MATERIALIZED_WORKTREE"
          }
          trap cleanup_materialized_worktree EXIT
          "$GIT_BIN" config core.autocrlf false
          "$GIT_BIN" worktree add --detach "$MATERIALIZED_WORKTREE" "$VT_G19_CHECKOUT_SHA"
          cd "$MATERIALIZED_WORKTREE"
          "$GIT_BIN" config core.autocrlf false
          "$GIT_BIN" reset --hard "$VT_G19_CHECKOUT_SHA"
          VERIFIED_WORKSPACE_HELPER="$MATERIALIZED_WORKTREE/.verified-workspace-helper"
          "$GIT_BIN" cat-file blob "$VT_G19_CHECKOUT_SHA:tests/lib/verify-tracked-workspace.sh" > "$VERIFIED_WORKSPACE_HELPER"
          WORKSPACE_HELPER_SHA="$(sha256sum "$VERIFIED_WORKSPACE_HELPER" | awk '{print $1}')"
          if [ "$WORKSPACE_HELPER_SHA" != "$VT_G19_EXPECTED_WORKSPACE_HELPER_SHA" ]; then
            echo "G-19 FAIL: verified workspace helper hash mismatch ($WORKSPACE_HELPER_SHA)"
            exit 1
          fi
          source "$VERIFIED_WORKSPACE_HELPER"
          verify_tracked_workspace_file .github/workflows/ci.yml
          verify_tracked_workspace_file README.md
          verify_tracked_workspace_file DISCLAIMER.md
          verify_tracked_workspace_file SECURITY.md
          verify_tracked_workspace_file docs/release-readiness.md
          verify_tracked_workspace_file release/README.md
          verify_tracked_workspace_file release/BOOTSTRAP.md
          verify_tracked_workspace_file release/fixtures/example-release-manifest.json
          verify_tracked_workspace_file release/fixtures/example-release-manifest.sig
          verify_tracked_workspace_file release/test-public-key.pub
          verify_tracked_workspace_file tests/lib/verify-tracked-workspace.sh
          verify_tracked_workspace_file tests/run-gates.sh
          verify_tracked_workspace_file tests/g19-v2-structural-check.sh
          verify_tracked_workspace_file memoriaia/verify/verify-hashchain.py
          verify_tracked_workspace_file memoriaia/verify/verify-release-manifest.py
          verify_tracked_workspace_file verify/verify-hashchain.sh
          verify_tracked_workspace_file verify/verify-release-manifest.sh
          "$GIT_BIN" ls-files 'tests/fixtures/g19-v2/*.yml' | while IFS= read -r fixture; do
            verify_tracked_workspace_file "$fixture"
          done
          bash tests/run-gates.sh

      - name: G-19 CI anti-theater (run-gates execution proof required)
        if: always()
        env:
          VT_G19_EXPECTED_RUN_GATES_SHA: "fe54256f29b1ba7ea8547f2b4ac6df575db57665b1684605b353c09af391033e"
          VT_G19_EXPECTED_STRUCTURAL_CHECK_SHA: "bbc21b0c313f093c7965a6fe0c7175e6e8536c907ae40429f40268ff82056a35"
          VT_G19_EXPECTED_WORKSPACE_HELPER_SHA: "e105de0bca00c509bfff6923515cccb9ab416013a20f17ff90a7159c52890a06"
          VT_G19_EXPECTED_VERIFY_PY_SHA: "abedd126eac0227dddad9267d8863d1b3b4921ef0bdc69301f59b9c9d708683b"
          VT_G19_EXPECTED_VERIFY_SH_SHA: "65694b5e0abe95f3322c45ab7c69b597d83121ec14001bdbba8e6e83f2224192"
          VT_G19_EXPECTED_FIXTURE_MANIFEST_SHA: "ed002608e565b853c03f868097e684361e43b49db6ae75f3567b8ef75dfea8ed"
          VT_G19_EXPECTED_RELEASE_MATERIAL_SHA: "93fd9eba6731a1f7967dd18de60b4031319376242266ba6291ad9415196f6dca"
          VT_G19_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VT_G19_PR_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || github.sha }}
          VT_G19_CHECKOUT_SHA: ${{ github.sha }}
        run: |
          if [ -n "${GIT_DIR:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_DIR)"
            exit 1
          fi
          if [ -n "${GIT_WORK_TREE:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_WORK_TREE)"
            exit 1
          fi
          if [ -n "${GIT_EXEC_PATH:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_EXEC_PATH)"
            exit 1
          fi
          if [ -n "${GIT_INDEX_FILE:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_INDEX_FILE)"
            exit 1
          fi
          if [ -n "${GIT_OBJECT_DIRECTORY:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_OBJECT_DIRECTORY)"
            exit 1
          fi
          if [ -n "${GIT_ALTERNATE_OBJECT_DIRECTORIES:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_ALTERNATE_OBJECT_DIRECTORIES)"
            exit 1
          fi
          if [ -n "${GIT_CONFIG:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CONFIG)"
            exit 1
          fi
          if [ -n "${GIT_CONFIG_GLOBAL:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CONFIG_GLOBAL)"
            exit 1
          fi
          if [ -n "${GIT_CONFIG_SYSTEM:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CONFIG_SYSTEM)"
            exit 1
          fi
          if [ -n "${GIT_CONFIG_NOSYSTEM:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CONFIG_NOSYSTEM)"
            exit 1
          fi
          if [ -n "${GIT_NAMESPACE:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_NAMESPACE)"
            exit 1
          fi
          if [ -n "${GIT_CEILING_DIRECTORIES:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_CEILING_DIRECTORIES)"
            exit 1
          fi
          if [ -n "${GIT_PAGER:-}" ]; then
            echo "G-19 FAIL: proof-critical git environment variable is set (GIT_PAGER)"
            exit 1
          fi
          git_config_env="$(env | sed -n 's/^\(GIT_CONFIG_[^=]*\)=.*/\1/p' | head -n 1)"
          if [ -n "$git_config_env" ]; then
            echo "G-19 FAIL: proof-critical git config environment variable is set ($git_config_env)"
            exit 1
          fi
          if ! GIT_BIN="$(command -v git)"; then
            echo "G-19 FAIL: git executable is unavailable"
            exit 1
          fi
          if [ ! -x "$GIT_BIN" ]; then
            echo "G-19 FAIL: git executable is unavailable"
            exit 1
          fi
          GIT_BIN_DIR="$(cd "$(dirname "$GIT_BIN")" && pwd -P)"
          GIT_BIN="$GIT_BIN_DIR/$(basename "$GIT_BIN")"
          WORKSPACE_PHYSICAL="$(pwd -P)"
          if [[ "$GIT_BIN" == "$WORKSPACE_PHYSICAL"/* || "$GIT_BIN" == /tmp/* || "$GIT_BIN" == /var/tmp/* || "$GIT_BIN" == /dev/shm/* || "$GIT_BIN" == */AppData/Local/Temp/* || "$GIT_BIN" == */Temp/* || "$GIT_BIN" == */_temp/* ]]; then
            echo "G-19 FAIL: git executable resolves outside trusted system paths ($GIT_BIN)"
            exit 1
          fi
          if [ "${{ steps.run_gates.outcome }}" != "success" ]; then
            echo "G-19 FAIL: tests/run-gates.sh did not complete successfully (outcome: ${{ steps.run_gates.outcome }})"
            exit 1
          fi
          if ! printf '%s\n' "$VT_G19_PR_HEAD_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "G-19 FAIL: PR head SHA is invalid ($VT_G19_PR_HEAD_SHA)"
            exit 1
          fi
          if ! printf '%s\n' "$VT_G19_PR_BASE_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "G-19 FAIL: PR base SHA is invalid ($VT_G19_PR_BASE_SHA)"
            exit 1
          fi
          if ! printf '%s\n' "$VT_G19_CHECKOUT_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "G-19 FAIL: checkout SHA is invalid ($VT_G19_CHECKOUT_SHA)"
            exit 1
          fi
          CHECKOUT_SHA="$("$GIT_BIN" rev-parse HEAD)"
          if [ "$CHECKOUT_SHA" != "$VT_G19_CHECKOUT_SHA" ]; then
            echo "G-19 FAIL: checkout SHA mismatch (expected $VT_G19_CHECKOUT_SHA, got $CHECKOUT_SHA)"
            exit 1
          fi
          RUN_GATES_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:tests/run-gates.sh" | sha256sum | awk '{print $1}')"
          if [ "$RUN_GATES_SHA" != "$VT_G19_EXPECTED_RUN_GATES_SHA" ]; then
            echo "G-19 FAIL: tests/run-gates.sh hash mismatch ($RUN_GATES_SHA)"
            exit 1
          fi
          STRUCTURAL_CHECK_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:tests/g19-v2-structural-check.sh" | sha256sum | awk '{print $1}')"
          if [ "$STRUCTURAL_CHECK_SHA" != "$VT_G19_EXPECTED_STRUCTURAL_CHECK_SHA" ]; then
            echo "G-19 FAIL: tests/g19-v2-structural-check.sh hash mismatch ($STRUCTURAL_CHECK_SHA)"
            exit 1
          fi
          WORKSPACE_HELPER_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:tests/lib/verify-tracked-workspace.sh" | sha256sum | awk '{print $1}')"
          if [ "$WORKSPACE_HELPER_SHA" != "$VT_G19_EXPECTED_WORKSPACE_HELPER_SHA" ]; then
            echo "G-19 FAIL: tests/lib/verify-tracked-workspace.sh hash mismatch ($WORKSPACE_HELPER_SHA)"
            exit 1
          fi
          CI_YML_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:.github/workflows/ci.yml" | sha256sum | awk '{print $1}')"
          VERIFY_PY_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:memoriaia/verify/verify-hashchain.py" | sha256sum | awk '{print $1}')"
          if [ "$VERIFY_PY_SHA" != "$VT_G19_EXPECTED_VERIFY_PY_SHA" ]; then
            echo "G-19 FAIL: memoriaia/verify/verify-hashchain.py hash mismatch ($VERIFY_PY_SHA)"
            exit 1
          fi
          VERIFY_SH_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:verify/verify-hashchain.sh" | sha256sum | awk '{print $1}')"
          if [ "$VERIFY_SH_SHA" != "$VT_G19_EXPECTED_VERIFY_SH_SHA" ]; then
            echo "G-19 FAIL: verify/verify-hashchain.sh hash mismatch ($VERIFY_SH_SHA)"
            exit 1
          fi
          FIXTURE_MANIFEST_SHA="$("$GIT_BIN" ls-files 'tests/fixtures/g19-v2/*.yml' | while IFS= read -r fixture; do fixture_sha="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:$fixture" | sha256sum | awk '{print $1}')"; printf '%s  %s\n' "$fixture_sha" "$fixture"; done | sha256sum | awk '{print $1}')"
          if [ "$FIXTURE_MANIFEST_SHA" != "$VT_G19_EXPECTED_FIXTURE_MANIFEST_SHA" ]; then
            echo "G-19 FAIL: G-19 fixture manifest hash mismatch ($FIXTURE_MANIFEST_SHA)"
            exit 1
          fi
          README_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:README.md" | sha256sum | awk '{print $1}')"
          DISCLAIMER_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:DISCLAIMER.md" | sha256sum | awk '{print $1}')"
          SECURITY_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:SECURITY.md" | sha256sum | awk '{print $1}')"
          RELEASE_READINESS_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:docs/release-readiness.md" | sha256sum | awk '{print $1}')"
          RELEASE_MANIFEST_VERIFIER_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:memoriaia/verify/verify-release-manifest.py" | sha256sum | awk '{print $1}')"
          RELEASE_MANIFEST_WRAPPER_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:verify/verify-release-manifest.sh" | sha256sum | awk '{print $1}')"
          RELEASE_README_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:release/README.md" | sha256sum | awk '{print $1}')"
          RELEASE_BOOTSTRAP_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:release/BOOTSTRAP.md" | sha256sum | awk '{print $1}')"
          RELEASE_MANIFEST_JSON_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:release/fixtures/example-release-manifest.json" | sha256sum | awk '{print $1}')"
          RELEASE_MANIFEST_SIG_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:release/fixtures/example-release-manifest.sig" | sha256sum | awk '{print $1}')"
          RELEASE_TEST_PUBLIC_KEY_SHA="$("$GIT_BIN" cat-file blob "$CHECKOUT_SHA:release/test-public-key.pub" | sha256sum | awk '{print $1}')"
          RELEASE_MATERIAL_SHA="$(printf '%s  %s\n%s  %s\n%s  %s\n%s  %s\n%s  %s\n%s  %s\n%s  %s\n%s  %s\n%s  %s\n%s  %s\n%s  %s\n' "$README_SHA" README.md "$DISCLAIMER_SHA" DISCLAIMER.md "$SECURITY_SHA" SECURITY.md "$RELEASE_READINESS_SHA" docs/release-readiness.md "$RELEASE_MANIFEST_VERIFIER_SHA" memoriaia/verify/verify-release-manifest.py "$RELEASE_MANIFEST_WRAPPER_SHA" verify/verify-release-manifest.sh "$RELEASE_README_SHA" release/README.md "$RELEASE_BOOTSTRAP_SHA" release/BOOTSTRAP.md "$RELEASE_MANIFEST_JSON_SHA" release/fixtures/example-release-manifest.json "$RELEASE_MANIFEST_SIG_SHA" release/fixtures/example-release-manifest.sig "$RELEASE_TEST_PUBLIC_KEY_SHA" release/test-public-key.pub | sha256sum | awk '{print $1}')"
          if [ "$RELEASE_MATERIAL_SHA" != "$VT_G19_EXPECTED_RELEASE_MATERIAL_SHA" ]; then
            echo "G-19 FAIL: release material hash mismatch ($RELEASE_MATERIAL_SHA)"
            exit 1
          fi
          PROOF="${{ steps.run_gates.outputs.vt_g19_exec_proof }}"
          if [ -z "$PROOF" ]; then
            echo "G-19 FAIL: VT_G19_EXEC_PROOF is missing"
            exit 1
          fi
          if ! printf '%s\n' "$PROOF" | grep -qE '^[0-9a-f]{64}$'; then
            echo "G-19 FAIL: VT_G19_EXEC_PROOF is invalid ($PROOF)"
            exit 1
          fi
          EXPECTED_PROOF="$(printf 'VT_G19_EXECUTED:v4\nPR_HEAD:%s\nPR_BASE:%s\nCHECKOUT:%s\nCI_YML:%s\nRUN_GATES:%s\nSTRUCTURAL:%s\nWORKSPACE_HELPER:%s\nVERIFY_PY:%s\nVERIFY_SH:%s\nFIXTURES:%s\nRELEASE_MATERIAL:%s\n' "$VT_G19_PR_HEAD_SHA" "$VT_G19_PR_BASE_SHA" "$CHECKOUT_SHA" "$CI_YML_SHA" "$RUN_GATES_SHA" "$STRUCTURAL_CHECK_SHA" "$WORKSPACE_HELPER_SHA" "$VERIFY_PY_SHA" "$VERIFY_SH_SHA" "$FIXTURE_MANIFEST_SHA" "$RELEASE_MATERIAL_SHA" | sha256sum | awk '{print $1}')"
          if [ "$PROOF" != "$EXPECTED_PROOF" ]; then
            echo "G-19 FAIL: VT_G19_EXEC_PROOF preimage mismatch (expected $EXPECTED_PROOF, got $PROOF)"
            exit 1
          fi
          echo "G-19 PASS: PR head $VT_G19_PR_HEAD_SHA; base $VT_G19_PR_BASE_SHA; checkout $CHECKOUT_SHA"
          echo "G-19 PASS: Execution proved ($PROOF)"
