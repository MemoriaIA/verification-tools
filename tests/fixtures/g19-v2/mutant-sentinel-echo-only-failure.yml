name: Verification Tools CI
jobs:
  gates:
    steps:
      - name: Run verification gate suite
        id: run_gates
        run: |
          bash tests/run-gates.sh
      - name: G-19 CI anti-theater (run-gates execution proof required)
        if: always()
        run: |
          if [ "${{ steps.run_gates.outcome }}" != "success" ]; then
            echo "run-gates did not succeed"
          fi
          PROOF="${{ steps.run_gates.outputs.vt_g19_exec_proof }}"
          if [ -z "$PROOF" ]; then
            echo "proof missing"
          fi
          if ! printf '%s\n' "$PROOF" | grep -qE '^[0-9a-f]{64}$'; then
            echo "proof invalid"
          fi
