name: Verification Tools CI
jobs:
  gates:
    steps:
      - name: Chained escaped eval output proof forge
        run: |
          name=$(printf 'GITHUB_%s' OUTPUT)
          proof=$(printf 'vt_g19_exec_%s' proof)
          op='>'
          op="${op}${op}"
          cmd='t="${!name}"'
          write='printf "%s=%s\n" "$proof" aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa '"$op"' "$t"'
          true; e\val "$cmd"
          true; e\val "$write"
      - name: Run verification gate suite
        id: run_gates
        run: |
          bash tests/run-gates.sh
      - name: G-19 CI anti-theater (run-gates execution proof required)
        if: always()
        run: |
          if [ "${{ steps.run_gates.outcome }}" != "success" ]; then
            exit 1
          fi
          PROOF="${{ steps.run_gates.outputs.vt_g19_exec_proof }}"
          if [ -z "$PROOF" ]; then
            exit 1
          fi
          if ! printf '%s\n' "$PROOF" | grep -qE '^[0-9a-f]{64}$'; then
            exit 1
          fi
