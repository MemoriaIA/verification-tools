name: mutant step env GIT_OBJECT_DIRECTORY
on: [pull_request]
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Run verification gate suite
        id: run_gates
        env:
          GIT_OBJECT_DIRECTORY: /tmp/poison-objects
        run: bash tests/run-gates.sh
      - name: G-19 CI anti-theater (run-gates execution proof required)
        if: always()
        run: |
          if [ "${{ steps.run_gates.outcome }}" != "success" ]; then
            exit 1
          fi
          PROOF="${{ steps.run_gates.outputs.vt_g19_exec_proof }}"
          if [ -z "$PROOF" ]; then
            exit 1
          fi
          if ! printf '%s\n' "$PROOF" | grep -qE '^[0-9a-f]{64}$'; then
            exit 1
          fi
