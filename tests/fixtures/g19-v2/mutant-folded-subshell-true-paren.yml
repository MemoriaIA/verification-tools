name: Verification Tools CI
jobs:
  gates:
    steps:
      - name: Run verification gate suite
        id: run_gates
        run: >
          ( bash tests/run-gates.sh || true )
      - name: G-19 CI anti-theater (run-gates execution proof required)
        if: always()
        run: |
          if [ "${{ steps.run_gates.outcome }}" != "success" ]; then
            exit 1
          fi
